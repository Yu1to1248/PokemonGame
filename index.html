'use strict';

// Global error handler to surface the real error
window.addEventListener('error', function(e) {
  const msg = (e.message||'?') + ' at ' + (e.filename||'?') + ':' + (e.lineno||'?');
  document.body.style.background='#200';
  const d=document.createElement('div');
  d.style.cssText='position:fixed;top:0;left:0;right:0;padding:12px;background:#400;color:#fff;font:12px monospace;z-index:9999;white-space:pre-wrap';
  d.textContent='ERROR: '+msg+(e.error?'\n'+e.error.stack:'');
  document.body.appendChild(d);
});
const CV=document.getElementById('c'),ctx=CV.getContext('2d');
let W=0,H=0;
let SAFE=64;
function updSafe(){const v=window.visualViewport;const ih=v?v.height:window.innerHeight;SAFE=ih<500?44:(ih<750?56:64);}
function resize(){const v=window.visualViewport;W=CV.width=v?v.width:window.innerWidth;H=CV.height=v?v.height:window.innerHeight;}
resize();updSafe();window.addEventListener('resize',()=>{resize();updSafe();});if(window.visualViewport)window.visualViewport.addEventListener('resize',()=>{resize();updSafe();});
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    const R=Math.min(r,w/2,h/2);
    this.moveTo(x+R,y);this.lineTo(x+w-R,y);this.arcTo(x+w,y,x+w,y+R,R);
    this.lineTo(x+w,y+h-R);this.arcTo(x+w,y+h,x+w-R,y+h,R);
    this.lineTo(x+R,y+h);this.arcTo(x,y+h,x,y+h-R,R);
    this.lineTo(x,y+R);this.arcTo(x,y,x+R,y,R);this.closePath();return this;};
}

// ── WORLD / CAM ─────────────────────────────────────────
const WW=2400,WH=2400;
const cam={x:WW/2,y:WH/2};
const camX=()=>W/2-cam.x,camY=()=>H/2-cam.y;
function updSelScroll(dt){if(!selScrollDragging&&Math.abs(selScrollVY)>.5){selScrollY=Math.max(selScrollMax,Math.min(0,selScrollY+selScrollVY));selScrollVY*=.88;}else if(!selScrollDragging)selScrollVY=0;}
function updCam(){if(!PL)return;cam.x=Math.max(W/2,Math.min(WW-W/2,PL.x));cam.y=Math.max(H/2,Math.min(WH-H/2,PL.y));}
// (SAFE moved to top)

// ── MAP DECO ─────────────────────────────────────────────
const DCOLS=['#3366ff','#ff44aa','#4499ff','#aa44ff','#ffaa33','#44ffee'];

for(let i=0;i<70;i++)deco.push({x:80+Math.random()*(WW-160),y:80+Math.random()*(WH-160),t:i%3,sz:7+Math.random()*15,col:DCOLS[i%6],ph:Math.random()*Math.PI*2});

// ── STATE ────────────────────────────────────────────────

const addShake=(i,d)=>{shk.i=Math.max(shk.i,i);shk.d=Math.max(shk.d,d);};
const addFlash=(c,a)=>{fl.c=c;fl.a=Math.max(fl.a,a);};

// ── PARTICLES ────────────────────────────────────────────
const pts=[],pPool=[];
function spawnP(x,y,vx,vy,col,life,sz){
  if(pts.length>=550)return;
  const p=pPool.length?pPool.pop():{};
  p.x=x;p.y=y;p.vx=vx;p.vy=vy;p.col=col;p.life=life;p.ml=life;p.sz=sz;pts.push(p);
}
function burst(x,y,cols,n,spd,life,sz){
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=spd*(0.4+Math.random()*0.9);spawnP(x,y,Math.cos(a)*s,Math.sin(a)*s,cols[i%cols.length],life*(0.5+Math.random()*0.8),sz*(0.5+Math.random()));}
}
function dirBurst(x,y,ang,spr,cols,n,spd,life,sz){
  for(let i=0;i<n;i++){const a=ang+(Math.random()-.5)*spr,s=spd*(0.4+Math.random());spawnP(x,y,Math.cos(a)*s,Math.sin(a)*s,cols[i%cols.length],life*(0.5+Math.random()*.8),sz*(0.4+Math.random()*.8));}
}
function updPts(dt){
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.9;p.vy*=.9;p.life-=dt;if(p.life<=0){pPool.push(p);pts.splice(i,1);}}
}
function drawPts(){
  ctx.save();ctx.translate(camX(),camY());
  for(const p of pts){const a=p.life/p.ml;ctx.globalAlpha=a;ctx.shadowColor=p.col;ctx.shadowBlur=p.sz*2.5;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz*Math.max(.1,a),0,Math.PI*2);ctx.fill();}
  ctx.shadowBlur=0;ctx.globalAlpha=1;ctx.restore();
}

// ── ATTACKS ──────────────────────────────────────────────
const attacks=[];
let roarBeam=null,hydroBeam=null,gensoBeam=null;
const clrAttacks=()=>{attacks.length=0;roarBeam=null;hydroBeam=null;gensoBeam=null;};

function drawMiraidon(ctx,x,y,r,ang,atk){
  ctx.save();ctx.translate(x,y);ctx.rotate(ang);ctx.scale(1+atk*.12,1+atk*.12);
  ctx.save();ctx.globalAlpha=.28+.2*Math.sin(now*8);const agM=ctx.createRadialGradient(0,0,0,0,0,r*1.8);agM.addColorStop(0,'rgba(100,200,255,.7)');agM.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=agM;ctx.beginPath();ctx.arc(0,0,r*1.8,0,Math.PI*2);ctx.fill();ctx.restore();
  const bg=ctx.createRadialGradient(-r*.1,0,0,0,0,r);bg.addColorStop(0,'#44aaff');bg.addColorStop(.6,'#2255cc');bg.addColorStop(1,'#001155');
  ctx.fillStyle=bg;ctx.beginPath();ctx.moveTo(0,-r*.9);ctx.bezierCurveTo(r*.7,-r*.7,r*.8,r*.3,r*.5,r*.8);ctx.bezierCurveTo(r*.2,r,-r*.2,r,-r*.5,r*.8);ctx.bezierCurveTo(-r*.8,r*.3,-r*.7,-r*.7,0,-r*.9);ctx.closePath();ctx.fill();ctx.strokeStyle='#88eeff';ctx.lineWidth=1.5;ctx.stroke();
  ctx.strokeStyle='#ffee44';ctx.lineWidth=2.5;ctx.shadowColor='#ffee00';ctx.shadowBlur=12;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(-r*.25,-r*.45);ctx.lineTo(r*.12,-r*.08);ctx.lineTo(-r*.12,r*.12);ctx.lineTo(r*.28,r*.55);ctx.stroke();ctx.shadowBlur=0;
  const hg=ctx.createRadialGradient(0,-r*.7,0,0,-r*.7,r*.32);hg.addColorStop(0,'#88ccff');hg.addColorStop(1,'#1144aa');ctx.fillStyle=hg;ctx.beginPath();ctx.ellipse(0,-r*.7,r*.28,r*.24,0,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#aaddff';ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle='#44ffff';ctx.shadowColor='#44ffff';ctx.shadowBlur=10;ctx.beginPath();ctx.ellipse(0,-r*.72,r*.15,r*.07,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  for(let s=-1;s<=1;s+=2){ctx.strokeStyle='#1133aa';ctx.lineWidth=r*.2;ctx.lineCap='round';ctx.beginPath();ctx.arc(0,r*.55,r*.3,s*.4,s*2.7,s<0);ctx.stroke();ctx.strokeStyle='#4488cc';ctx.lineWidth=r*.07;ctx.stroke();}

function drawHooh(ctx,x,y,r,ang,atk){

  hit(dmg,kbx=0,kby=0){

      this.dead=true;

      if(PL)PL.addGauge(this.type==='tank'?22:this.type==='elite'?18:this.type==='brute'?30:9);
      const bc=this.type==='sniper'?['#cc44ff','#ff88ff','#fff','#9922ee']:this.type==='brute'?['#aa6633','#cc8844','#ff9944','#fff']:this.type==='tank'?['#ff4400','#ff8800','#ffcc00','#fff']:this.type==='fast'?['#ff0088','#ff44aa','#fff']:this.type==='elite'?['#1155cc','#3388ff','#ffcc00','#fff']:['#ff4400','#ff8800','#ffdd44','#fff'];

    const S={dialga:{spd:190,hp:200},palkia:{spd:210,hp:180},kyurem:{spd:200,hp:220},rayquaza:{spd:198,hp:230},groudon:{spd:188,hp:250},kyogre:{spd:192,hp:240},wkyurem:{spd:202,hp:225},zacian:{spd:215,hp:210},miraidon:{spd:222,hp:205},koraidon:{spd:208,hp:238},mewtwo:{spd:218,hp:188},giratina:{spd:186,hp:252},necrozmaD:{spd:196,hp:228},necrozmaW:{spd:200,hp:218},hooh:{spd:192,hp:245},lugia:{spd:196,hp:238},garchomp:{spd:218,hp:215},charizard:{spd:212,hp:200},lucario:{spd:215,hp:195},greninja:{spd:228,hp:190},gardevoir:{spd:205,hp:210}};
    const st=S[ct]||{spd:190,hp:200};this.spd=st.spd;this.maxHp=st.hp;this.hp=this.maxHp;
    this.gauge=0;this.facing={x:0,y:-1};
    this.sk1cd=0;this.sk2cd=0;this.specialOn=false;this.specialT=0;
    this.animT=0;this.atkAnim=0;this.dmgFlash=0;
    this.dashT=0;this.dashDx=0;this.dashDy=0;this.dashHitSet=new Set();
    this.flyActive=false;this.flyT=0;this.flyMaxT=2;this.flyLX=0;this.flyLY=0;
    this.mega=false;this.primal=false;this.crownShield=false;
    this.megaT=0; // メガ/ゲンシ持続タイマー
    this.invincT=0; // invincibility frames
  }
  update(dt){
    this.animT+=dt;this.atkAnim=Math.max(0,this.atkAnim-dt*4);this.dmgFlash=Math.max(0,this.dmgFlash-dt*5);this.invincT=Math.max(0,this.invincT-dt);
    this.sk1cd=Math.max(0,this.sk1cd-dt);this.sk2cd=Math.max(0,this.sk2cd-dt);
    if(this.megaT>0){this.megaT-=dt;if(this.megaT<=0){if(this.mega){this.mega=false;burst(this.x,this.y,['#ffaa00','#fff'],20,200,.4,5);}if(this.primal){this.primal=false;burst(this.x,this.y,['#ff6600','#44aaff','#fff'],20,200,.4,5);}}}
    if(this.flyActive){
      this.flyT-=dt;
      // Joystick moves landing point during flight
      const jmag=Math.hypot(joy.dx,joy.dy);
      if(jmag>.05){
        const spd=(this.mega?520:380)*jmag;
        this.flyLX=Math.max(80,Math.min(WW-80,this.flyLX+joy.dx*spd*dt));
        this.flyLY=Math.max(80,Math.min(WH-80,this.flyLY+joy.dy*spd*dt));
        this.facing.x=joy.dx;this.facing.y=joy.dy;
      }
      // Camera follows landing indicator
      cam.x=Math.max(W/2,Math.min(WW-W/2,this.flyLX));
      cam.y=Math.max(H/2,Math.min(WH-H/2,this.flyLY));
      if(this.flyT<=0){this.x=this.flyLX;this.y=this.flyLY;this.flyActive=false;doFlyLand(this);this.invincT=3;}
      return;
    }
    if(this.dashT>0){
      const dspd=this.dashSpd||1400;
      this.dashT-=dt;this.x+=this.dashDx*dspd*dt;this.y+=this.dashDy*dspd*dt;
      this.x=Math.max(this.r,Math.min(WW-this.r,this.x));this.y=Math.max(this.r,Math.min(WH-this.r,this.y));
      if(Math.random()<.9)burst(this.x,this.y,['#ffee00','#44ddff','#fff'],3,90,.2,5);
      for(const e of enemies){if(!this.dashHitSet.has(e)&&Math.hypot(e.x-this.x,e.y-this.y)<e.r+this.r+10){e.hit(80,this.dashDx*22,this.dashDy*18);this.dashHitSet.add(e);burst(e.x,e.y,[this.dashCol||'#ffee00','#fff'],12,180,.25,4);}}
      if(this.dashT<=0){
        const dc=this.dashCol||'#ffee00',r2=this.ct==='necrozmaD'?220:155;
        burst(this.x,this.y,[dc,'#fff'],55,this.ct==='necrozmaD'?420:340,.7,7);addShake(this.ct==='necrozmaD'?18:12,.35);addFlash(dc,.45);
        for(const e of enemies){if(Math.hypot(e.x-this.x,e.y-this.y)<r2){e.hit(this.ct==='necrozmaD'?160:110,0,0);}}
        if(boss&&!boss.dead&&Math.hypot(boss.x-this.x,boss.y-this.y)<r2)boss.hit(this.ct==='necrozmaD'?160:110);
        attacks.push({type:'elecBoom',x:this.x,y:this.y,r:0,maxR:r2,life:.45,maxLife:.45,dead:false});
        this.dashSpd=null;this.dashCol=null;
      }
      updCam();return;
    }
    let jdx=joy.dx,jdy=joy.dy;
    // WASD keyboard movement
    if(keys['KeyW']||keys['ArrowUp'])jdy-=1;
    if(keys['KeyS']||keys['ArrowDown'])jdy+=1;
    if(keys['KeyA']||keys['ArrowLeft'])jdx-=1;
    if(keys['KeyD']||keys['ArrowRight'])jdx+=1;
    const klen=Math.hypot(jdx,jdy);if(klen>1){jdx/=klen;jdy/=klen;}
    const mag=Math.hypot(jdx,jdy);
    if(mag>.05){const s=this.spd*(this.specialOn?.3:1);this.x+=jdx*s*dt;this.y+=jdy*s*dt;if(mag>.2){this.facing.x=jdx;this.facing.y=jdy;}}
    this.x=Math.max(this.r,Math.min(WW-this.r,this.x));this.y=Math.max(this.r,Math.min(WH-this.r,this.y));
    if(this.specialOn){this.specialT-=dt;if(this.specialT<=0){this.specialOn=false;slow=1;if(this.ct==='dialga')roarBeam=null;}}
    updCam();
  }
  takeDmg(d){if(this.hp<=0||this.flyActive||this.dashT>0||this.invincT>0)return;this.hp=Math.max(0,this.hp-d);this.dmgFlash=1;addShake(10,.22);addFlash('#ff2200',.42);if(this.hp<=0)state='gameover';}
  addGauge(v){this.gauge=Math.min(100,this.gauge+v);}
  // Multiplier for primal/mega
  sk1Mult(){return(this.mega||this.primal)?1.5:1;}
  useSkill1(){

    else if(ct==='wkyurem'){this.sk1cd=.5;doWKyuClaw(this);}
    else if(ct==='zacian'){this.sk1cd=.18;doQuickAttack(this);}
    else if(ct==='miraidon'){this.sk1cd=.5;doMiraidonClaw(this);}
    else if(ct==='koraidon'){this.sk1cd=.5;doKoraidonClaw(this);}
    else if(ct==='mewtwo'){this.sk1cd=.25;doPsychoCutter(this);}

    else if(ct==='necrozmaW'){this.sk1cd=.5;doShadowClaw(this);}

    else if(ct==='charizard'){this.sk1cd=.4;doAirSlash(this);}
    else if(ct==='lucario'){this.sk1cd=.38;doDrainPunch(this);}

    else if(ct==='gardevoir'){this.sk1cd=.42;doSycoKinesis(this,false);}
    else{this.sk1cd=.5;doNaminori(this);}
  }
  useSkill2(){
    if(this.sk2cd>0||this.flyActive)return;this.atkAnim=1;
    const ct=this.ct;
    if(ct==='dialga'){this.sk2cd=3;doLusterCannon(this);}

  useSpecial(){
    if(this.gauge<100||this.flyActive)return;
    const ct=this.ct;
    if(ct==='rayquaza'){if(!this.mega){this.gauge=0;doMegaEvo(this);}return;}

    if(ct==='zacian'){this.gauge=0;doKyojuzan(this);return;}
    if(ct==='miraidon'){if(this.dashT>0)return;this.gauge=0;doInazumaDrive(this);return;}
    if(ct==='koraidon'){if(this.dashT>0)return;this.gauge=0;doAccelBreak(this);return;}
    if(ct==='necrozmaD'){if(this.dashT>0)return;this.gauge=0;this.atkAnim=1;doMeteoDrive(this);return;}

    this.gauge=0;this.specialOn=true;this.atkAnim=1;

  }
  draw(){
    if(this.flyActive){
      ctx.save();ctx.translate(this.flyLX,this.flyLY);
      const fr=this.flyT/this.flyMaxT,pulse=.5+.5*Math.sin(now*12),lR=this.mega?220:this.primal?240:140;
      ctx.globalAlpha=(1-fr)*.7*pulse;const lc=this.mega?'#ffaa00':this.primal&&this.ct==='groudon'?'#ff6600':this.primal&&this.ct==='kyogre'?'#44aaff':this.ct==='giratina'?'#6633aa':'#44ff88';
      ctx.shadowColor=lc;ctx.shadowBlur=20;ctx.strokeStyle=lc;ctx.lineWidth=2.5;
      for(const rr of[lR*.4,lR*.7,lR]){ctx.beginPath();ctx.arc(0,0,rr,0,Math.PI*2);ctx.stroke();}
      for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2;ctx.beginPath();ctx.moveTo(Math.cos(a)*(lR-18),Math.sin(a)*(lR-18));ctx.lineTo(Math.cos(a)*lR,Math.sin(a)*lR);ctx.stroke();}
      ctx.shadowBlur=0;ctx.restore();
      if(fr>.8)burst(this.x,this.y,['#44ff88','#88ffaa','#fff'],2,80,.15,3);
      return;
    }
    ctx.save();ctx.translate(this.x,this.y);
    if(this.dmgFlash>0){ctx.save();ctx.globalCompositeOperation='screen';ctx.globalAlpha=this.dmgFlash*.7;ctx.fillStyle='#ff2200';ctx.beginPath();ctx.arc(0,0,this.r*2,0,Math.PI*2);ctx.fill();ctx.restore();}
    const ang=Math.atan2(this.facing.y,this.facing.x)+Math.PI/2,bob=Math.sin(this.animT*3)*2;
    if(this.ct==='dialga')drawDialga(ctx,0,bob,this.r,ang,this.atkAnim);

    else drawKyogre(ctx,0,bob,this.r,ang,this.atkAnim,this.primal);
    ctx.restore();
  }
}

function doMetalClaw(p){
  const base=Math.atan2(p.facing.y,p.facing.x),m=p.sk1Mult();
  for(let i=-1;i<=1;i++){const a=base+i*.28;attacks.push({type:'metalClaw',x:p.x+Math.cos(a)*p.r,y:p.y+Math.sin(a)*p.r,dx:Math.cos(a),dy:Math.sin(a),spd:450,range:115,traveled:0,dmg:20*m,life:.22,maxLife:.22,dead:false,hitSet:new Set()});}
  dirBurst(p.x+Math.cos(base)*50,p.y+Math.sin(base)*50,base,1,['#aaddff','#88ccff','#fff'],18,180,.25,4);addShake(3,.08);
}
function doLusterCannon(p){
  const a=Math.atan2(p.facing.y,p.facing.x);attacks.push({type:'lusterCannon',x:p.x,y:p.y,dx:Math.cos(a),dy:Math.sin(a),spd:660,dmg:110,r:15,life:3,dead:false,trail:[],hitSet:new Set()});
  addFlash('#aaddff',.25);burst(p.x,p.y,['#4488ff','#88ccff','#fff','#ffdd00'],22,290,.38,5);addShake(5,.14);
}
function doRoarOfTime(p){
  const a=Math.atan2(p.facing.y,p.facing.x);roarBeam={ox:p.x,oy:p.y,angle:a,width:90,life:3.5,phase:0,hitCds:new Map()};
  slow=.28;addFlash('#4488ff',.7);addShake(15,.6);burst(p.x,p.y,['#4488ff','#88ccff','#fff','#ffdd00'],80,580,1.2,9);
  // 全敵を3秒凍結
  for(const e of enemies){e.frozenT=Math.max(e.frozenT||0,3.5);}
}
function doDragonClaw(p){

  burst(p.x+Math.cos(base)*60,p.y+Math.sin(base)*60,['#aa44ff','#ff44aa','#fff','#8844ff'],30,220,.45,5);addShake(4,.12);
}
function doHydroPump(p){
  const a=Math.atan2(p.facing.y,p.facing.x);hydroBeam={ox:p.x,oy:p.y,angle:a,width:54,life:1.8,totalLife:1.8,phase:0,hitCds:new Map()};

  burst(p.x+Math.cos(base)*68,p.y+Math.sin(base)*68,['#44ff88','#88ffaa','#ffee44','#fff'],30,230,.45,5);addShake(5,.14);
}
function doFly(p){

function doSycoKinesis(p,mega){
  const range=mega?240:180,dmg=mega?90:55,m=p.sk1Mult();
  // 範囲エフェクト表示用
  attacks.push({type:'sycoKinesisField',x:p.x,y:p.y,r:range,life:.7,maxLife:.7,dead:false,hitSet:new Set(),dmg:dmg*m});
  // 範囲内の敵にダメージ
  for(const e of enemies){const d=Math.hypot(e.x-p.x,e.y-p.y);if(d<range+e.r){const ed=d||1;e.hit(dmg*m,(e.x-p.x)/ed*14,(e.y-p.y)/ed*14);}}
  if(boss&&!boss.dead&&Math.hypot(boss.x-p.x,boss.y-p.y)<range+boss.r)boss.hit(dmg*m);
  // パーティクル演出
  for(let i=0;i<(mega?28:18);i++){const a=(i/(mega?28:18))*Math.PI*2;spawnP(p.x+Math.cos(a)*range*.7,p.y+Math.sin(a)*range*.7,Math.cos(a)*(mega?160:100),Math.sin(a)*(mega?160:100),'#cc44ff',.55+Math.random()*.4,4+Math.random()*(mega?6:4));}
  burst(p.x,p.y,['#cc44ff','#ff44aa','#ffffff','#aa88ff'],mega?50:30,mega?320:200,.6,mega?8:6);
  addFlash('#cc44ff',mega?.6:.4);addShake(mega?14:8,mega?.4:.22);
  if(mega){slow=.35;setTimeout(()=>{if(slow<1)slow=1;},500);}
}

function updAtk(dt){
  for(let i=attacks.length-1;i>=0;i--){
    const a=attacks[i];a.life-=dt;if(a.life<=0)a.dead=true;
    if(a.type==='lusterCannon'){
      a.x+=a.dx*a.spd*dt*slow;a.y+=a.dy*a.spd*dt*slow;
      if(!a.trail.length||Math.hypot(a.x-a.trail[a.trail.length-1].x,a.y-a.trail[a.trail.length-1].y)>7){a.trail.push({x:a.x,y:a.y});if(a.trail.length>16)a.trail.shift();}
      if(a.x<-120||a.x>WW+120||a.y<-120||a.y>WH+120)a.dead=true;
      for(const e of enemies){if(!a.hitSet.has(e)&&Math.hypot(e.x-a.x,e.y-a.y)<e.r+a.r){e.hit(a.dmg,a.dx*8,a.dy*8);a.dead=true;break;}}
    }else if(a.type==='spacialSlash'){
      a.x+=a.dx*a.spd*dt;a.y+=a.dy*a.spd*dt;
      if(!a.trail.length||Math.hypot(a.x-a.trail[a.trail.length-1].x,a.y-a.trail[a.trail.length-1].y)>14){a.trail.push({x:a.x,y:a.y});if(a.trail.length>7)a.trail.shift();}
      if(a.x<-150||a.x>WW+150||a.y<-150||a.y>WH+150)a.dead=true;
      for(const e of enemies){if(!a.hitSet.has(e)&&Math.hypot(e.x-a.x,e.y-a.y)<e.r+a.r){e.hit(a.dmg,a.dx*20,a.dy*20);a.hitSet.add(e);burst(e.x,e.y,['#aa44ff','#fff','#ff44aa'],14,200,.38,5);addShake(5,.12);}}
    }else if(a.type==='gensiOrb'){
      a.x+=a.dx*a.spd*dt;a.y+=a.dy*a.spd*dt;
      if(!a.trail.length||Math.hypot(a.x-a.trail[a.trail.length-1].x,a.y-a.trail[a.trail.length-1].y)>10){a.trail.push({x:a.x,y:a.y});if(a.trail.length>8)a.trail.shift();}
      if(a.x<-200||a.x>WW+200||a.y<-200||a.y>WH+200)a.dead=true;
      for(const e of enemies){if(!a.hitSet.has(e)&&Math.hypot(e.x-a.x,e.y-a.y)<e.r+a.r){e.hit(a.dmg,a.dx*14,a.dy*14);a.hitSet.add(e);burst(e.x,e.y,['#44aaff','#88ddff','#fff'],12,180,.35,5);}}
    }else if(a.type==='jishin'){
      a.r+=a.spd*dt;if(a.r>=a.maxR)a.dead=true;
      // random rock particles on ring
      if(Math.random()<.65){const ang2=Math.random()*Math.PI*2,px=a.x+Math.cos(ang2)*a.r,py=a.y+Math.sin(ang2)*a.r;spawnP(px,py,(Math.random()-.5)*80,(Math.random()-.5)*80-40,Math.random()<.5?'#aa6633':'#cc8844',.35,4+Math.random()*4);}
      for(const e of enemies){const d=Math.hypot(e.x-a.x,e.y-a.y);if(d<a.r+e.r&&d>a.r-22-e.r){let cd=a.hitCds.get(e)||0;cd-=dt;if(cd<=0){e.hit(a.dmg||45,(e.x-a.x)/(d||1)*12,(e.y-a.y)/(d||1)*12);a.hitCds.set(e,.3);}else a.hitCds.set(e,cd);}}
    }else if(a.type==='naminori'){
      a.r+=a.spd*dt;if(a.r>=a.maxR)a.dead=true;
      if(Math.random()<.7){const ang2=a.angle+(Math.random()-.5)*.95,px=a.x+Math.cos(ang2)*a.r,py=a.y+Math.sin(ang2)*a.r;spawnP(px,py,Math.cos(ang2)*60+Math.random()*40,Math.sin(ang2)*60+Math.random()*40,'#44aaff',.3,3+Math.random()*4);}
      for(const e of enemies){
        const dx=e.x-a.x,dy=e.y-a.y,d=Math.hypot(dx,dy)||1;
        const proj=dx*Math.cos(a.angle)+dy*Math.sin(a.angle); // must be in front
        if(d<a.r+e.r&&d>a.r-20-e.r&&proj>0){if(!a.hitSet.has(e)){e.hit(a.dmg,Math.cos(a.angle)*12,Math.sin(a.angle)*12);a.hitSet.add(e);}}
      }
    }else if(a.type==='dangaiBlade'){
      // Rock pillar: damage on first frame
      if(!a._hitDone){a._hitDone=true;for(const e of enemies){if(Math.hypot(e.x-a.x,e.y-a.y)<e.r+a.sz+12&&!a.hitSet.has(e)){e.hit(a.dmg,(e.x-a.x)*.08,(e.y-a.y)*.08);a.hitSet.add(e);}}
        spawnP(a.x,a.y,(Math.random()-.5)*120,(Math.random()-.5)*120-60,'#cc4400',.45,5+Math.random()*5);
        spawnP(a.x,a.y,(Math.random()-.5)*90,(Math.random()-.5)*90-50,'#ff8844',.4,4+Math.random()*4);}
    }else if(a.type==='freezeBoltProj'){
      a.x+=a.dx*a.spd*dt;a.y+=a.dy*a.spd*dt;
      if(!a.trail||!a.trail.length||Math.hypot(a.x-a.trail[a.trail.length-1].x,a.y-a.trail[a.trail.length-1].y)>10){if(!a.trail)a.trail=[];a.trail.push({x:a.x,y:a.y});if(a.trail.length>12)a.trail.shift();}
      if(Math.random()<.6)spawnP(a.x+(Math.random()-.5)*20,a.y+(Math.random()-.5)*20,(Math.random()-.5)*80,(Math.random()-.5)*80,Math.random()<.5?'#2288ff':'#44aaff',.22,2+Math.random()*3);
      if(a.x<-200||a.x>WW+200||a.y<-200||a.y>WH+200)a.dead=true;
      if(!a.blasted){
        let bx=false;
        for(const e of enemies){if(Math.hypot(e.x-a.x,e.y-a.y)<e.r+a.r+4){bx=true;break;}}

const joy={active:false,tid:-1,bx:0,by:0,cx:0,cy:0,dx:0,dy:0,R:0};

const getBR=()=>Math.max(52,Math.min(W,H)*.098);
const getJR=()=>Math.max(62,Math.min(W,H)*.125);
function getBP(){const R=getBR(),isPort=H>W,S=R*(isPort?1.15:1.12),bx=W-R-18,by=H-R-SAFE-(isPort?8:12);return{skill1:{x:bx-S*1.9,y:by+S*.3},skill2:{x:bx,y:by+S*.3},special:{x:bx-S*.95,y:by-S*.92}};}

CV.addEventListener('touchstart',e=>{e.preventDefault();hStart(Array.from(e.changedTouches));},{passive:false});

const keys={};
document.addEventListener('keydown',e=>{
  if(e.repeat)return;
  keys[e.code]=true;
  if(state==='playing'&&PL){
    if(e.code==='KeyJ')PL.useSkill1();
    if(e.code==='KeyL')PL.useSkill2();
    if(e.code==='KeyI')PL.useSpecial();
  }
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
function hStart(ts){
  for(const t of ts){const tx=t.clientX,ty=t.clientY;
    if(state==='mode_select'){handleModeTap(tx,ty);continue;}
    if(state==='select'||state==='boss_select'){selScrollDragging=true;selTouchY0=ty;selTouchY1=ty;if(state==='select')handleSelectTap(tx,ty);else handleBossSelectTap(tx,ty);continue;}
    if(state==='boss_select'){handleBossSelectTap(tx,ty);continue;}
    if(state==='gameover'){restartToSelect();continue;}
    let hit=false;if(tx>W*.38){const bp=getBP(),BR=getBR()*1.45;for(const[k,pos]of Object.entries(bp)){if(btns[k].tid===-1&&Math.hypot(tx-pos.x,ty-pos.y)<BR){btns[k].tid=t.identifier;btns[k].pressed=true;hit=true;if(PL){if(k==='skill1')PL.useSkill1();else if(k==='skill2')PL.useSkill2();else PL.useSpecial();}break;}}}
    if(!hit&&tx<W*.62&&joy.tid===-1){const R=getJR();joy.active=true;joy.tid=t.identifier;joy.bx=tx;joy.by=ty;joy.cx=tx;joy.cy=ty;joy.dx=0;joy.dy=0;joy.R=R;}
  }
}
function hMove(ts){for(const t of ts){if(selScrollDragging){const dy=t.clientY-selTouchY1;selScrollY=Math.max(selScrollMax,Math.min(0,selScrollY+dy));selScrollVY=dy;selTouchY1=t.clientY;}if(t.identifier===joy.tid&&joy.active){const dx=t.clientX-joy.bx,dy=t.clientY-joy.by,d=Math.hypot(dx,dy),max=joy.R,nx=d>max?dx/d*max:dx,ny=d>max?dy/d*max:dy;joy.cx=joy.bx+nx;joy.cy=joy.by+ny;joy.dx=nx/max;joy.dy=ny/max;}}}
function hEnd(ts){selScrollDragging=false;for(const t of ts){if(t.identifier===joy.tid){joy.active=false;joy.tid=-1;joy.dx=0;joy.dy=0;}for(const k of Object.keys(btns)){if(t.identifier===btns[k].tid){btns[k].tid=-1;btns[k].pressed=false;}}}}

// ── GAME LOGIC ────────────────────────────────────────────
function startGame(ct,mode,bct){
  gameMode=mode||'survival';bossCt=bct||'dialga';
  PL=new Player(ct);boss=null;enemies.length=0;clrAttacks();pts.length=0;
  score=0;wave=1;waveT=0;spawnT=0;spawnI=gameMode==='boss'?99:3;slow=1;shk.i=shk.d=0;fl.a=0;
  cam.x=WW/2;cam.y=WH/2;state='playing';
  if(gameMode==='boss'){boss=new Boss(bossCt);spawnT=-0.5;}
}
function restartToSelect(){state='mode_select';PL=null;boss=null;enemies.length=0;clrAttacks();pts.length=0;score=0;wave=1;slow=1;selScrollY=0;selScrollVY=0;}
function updSpawn(dt){
  if(gameMode==='boss'){
    // Boss mode: spawn a few regular enemies as support
    spawnT+=dt;if(spawnT>=8){spawnT=0;spawnEnemy();if(wave>=2)spawnEnemy();}
    waveT+=dt;if(waveT>=30){waveT=0;wave++;}
    return;
  }
  spawnT+=dt;if(spawnT>=spawnI){spawnT=0;spawnI=Math.max(.8,spawnI-.04);spawnEnemy();
    if(wave>=3&&Math.random()<.45)spawnEnemy();if(wave>=6&&Math.random()<.3)spawnEnemy();}
  waveT+=dt;if(waveT>=30){waveT=0;wave++;}
}
function spawnEnemy(){
  const MG=80,vl=cam.x-W/2-MG,vr=cam.x+W/2+MG,vt=cam.y-H/2-MG,vb=cam.y+H/2+MG;
  const side=Math.floor(Math.random()*4);let x,y;
  if(side===0){x=vl+Math.random()*(vr-vl);y=vt;}else if(side===1){x=vr;y=vt+Math.random()*(vb-vt);}else if(side===2){x=vl+Math.random()*(vr-vl);y=vb;}else{x=vl;y=vt+Math.random()*(vb-vt);}
  x=Math.max(30,Math.min(WW-30,x));y=Math.max(30,Math.min(WH-30,y));
  const roll=Math.random(),hasElite=wave>=4,hasBrute=wave>=5,hasSniper=wave>=3;
  let type='basic';
  if(roll<.12)type='fast';
  else if(roll<.22)type='tank';
  else if(hasSniper&&roll<.35)type='sniper';
  else if(hasElite&&roll<.48)type='elite';
  else if(hasBrute&&roll<.54)type='brute';
  enemies.push(new Enemy(x,y,type));
}

function getCardLayout(){
  const PAD=Math.max(5,Math.min(W*.02,8)),cols=2;
  const cw=Math.min((W-PAD*(cols+1))/cols,172);
  const titleH=H*.14;
  // カードの高さを画面に合わせる（最低でも80px、最大120px）
  const ch=Math.max(80,Math.min((H-titleH)*.19,118));
  const totalW=cw*cols+PAD*(cols-1);
  const sx=(W-totalW)/2,sy=titleH+selScrollY;
  const cards={};CHARS.forEach((c,i)=>{cards[c]={x:sx+(i%2)*(cw+PAD),y:sy+Math.floor(i/2)*(ch+PAD),w:cw,h:ch};});
  // 最大スクロール量を計算
  const rows=Math.ceil(CHARS.length/2);
  const totalH=rows*(ch+PAD)+titleH;
  selScrollMax=Math.min(0,H-totalH-PAD);
  return cards;
}

}

let pendingMode='survival',pendingBossCt='dialga';

function handleModeTap(tx,ty){
  const cx=W/2,cy=H/2;const bw=Math.min(W*.75,300),bh=60,gap=20;
  const y1=cy-bh-gap/2,y2=cy+gap/2;
  if(tx>cx-bw/2&&tx<cx+bw/2&&ty>y1&&ty<y1+bh){pendingMode='survival';state='select';selScrollY=0;selScrollVY=0;}
  else if(tx>cx-bw/2&&tx<cx+bw/2&&ty>y2&&ty<y2+bh){pendingMode='boss';state='boss_select';selScrollY=0;selScrollVY=0;}
}
function handleBossSelectTap(tx,ty){if(Math.abs(selTouchY0-ty)>12)return;

  const L=getCardLayout();
  for(const ct of CHARS){const{x,y,w,h}=L[ct];const bH=22,bPad=6;
    if(tx>=x&&tx<=x+w&&ty>=y+h-bH-bPad-4&&ty<=y+h-bPad+4){bossCt=ct;state='select';selScrollY=0;selScrollVY=0;return;}}
  // Back button
  const bkY=H*.92,bkX=W/2;if(Math.hypot(tx-bkX,ty-bkY)<40){state='mode_select';}
}
function handleSelectTap(tx,ty){if(Math.abs(selTouchY0-ty)>12)return;// スクロール中はタップ無視

  const L=getCardLayout();
  for(const ct of CHARS){const{x,y,w,h}=L[ct];const bH=22,bPad=6;
    if(tx>=x&&tx<=x+w&&ty>=y+h-bH-bPad-4&&ty<=y+h-bPad+4){startGame(ct,pendingMode,bossCt);return;}}
  // Back button
  const bkY=H*.92,bkX=W/2;if(Math.hypot(tx-bkX,ty-bkY)<40){state='mode_select';}
}

function drawModeSelect(){
  // Background (stars shared)
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#07071f');bg.addColorStop(.5,'#120828');bg.addColorStop(1,'#050510');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(const s of stars){ctx.globalAlpha=.3+.35*Math.sin(now*s.sp+s.ph);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.sz,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.shadowColor='#6699ff';ctx.shadowBlur=28;ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(28,W*.078)}px Arial`;ctx.fillText('時空の守護者',W/2,H*.1);ctx.shadowBlur=0;
  ctx.fillStyle='#aaaacc';ctx.font=`${Math.min(12,W*.034)}px Arial`;ctx.fillText('モードを選択',W/2,H*.17);
  const cx=W/2,cy=H/2,bw=Math.min(W*.75,300),bh=60,gap=20;
  // Survival button
  const y1=cy-bh-gap/2;
  ctx.save();ctx.shadowColor='#4488ff';ctx.shadowBlur=18;ctx.beginPath();ctx.roundRect(cx-bw/2,y1,bw,bh,12);
  const b1g=ctx.createLinearGradient(cx-bw/2,y1,cx-bw/2,y1+bh);b1g.addColorStop(0,'#1a2a55');b1g.addColorStop(1,'#0a1230');
  ctx.fillStyle=b1g;ctx.fill();ctx.strokeStyle='#4488ff';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(22,W*.06)}px Arial`;ctx.fillText('🌊 サバイバル',cx,y1+bh/2+8);
  ctx.fillStyle='#8899bb';ctx.font=`${Math.min(11,W*.03)}px Arial`;ctx.fillText('波を生き延びろ',cx,y1+bh-6);ctx.restore();
  // Boss button
  const y2=cy+gap/2;
  ctx.save();ctx.shadowColor='#ff4400';ctx.shadowBlur=18;ctx.beginPath();ctx.roundRect(cx-bw/2,y2,bw,bh,12);
  const b2g=ctx.createLinearGradient(cx-bw/2,y2,cx-bw/2,y2+bh);b2g.addColorStop(0,'#3a1200');b2g.addColorStop(1,'#1a0800');
  ctx.fillStyle=b2g;ctx.fill();ctx.strokeStyle='#ff4400';ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(22,W*.06)}px Arial`;ctx.fillText('⚔️ ボスバトル',cx,y2+bh/2+8);
  ctx.fillStyle='#bb8877';ctx.font=`${Math.min(11,W*.03)}px Arial`;ctx.fillText('強大なボスに挑め',cx,y2+bh-6);ctx.restore();
  ctx.textAlign='left';
}

function drawBossSelectScreen(){
  // Stars bg
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,'#1a0a04');bg.addColorStop(1,'#050202');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  for(const s of stars){ctx.globalAlpha=.25+.3*Math.sin(now*s.sp+s.ph);ctx.fillStyle='#ff8844';ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.sz*.8,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.shadowColor='#ff4400';ctx.shadowBlur=24;ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(24,W*.068)}px Arial`;ctx.fillText('⚔️ ボスを選択',W/2,H*.09);ctx.shadowBlur=0;
  ctx.fillStyle='#ffaa88';ctx.font=`${Math.min(11,W*.032)}px Arial`;ctx.fillText('このポケモンと戦え！',W/2,H*.14);
  const titleHb=H*.14;ctx.save();ctx.beginPath();ctx.rect(0,titleHb,W,H-titleHb);ctx.clip();const L=getCardLayout();for(const ct of CHARS){const{x,y,w,h}=L[ct];drawCard(ct,x,y,w,h,'boss');}ctx.restore();
  // Back button
  ctx.textAlign='center';ctx.fillStyle='rgba(255,255,255,.3)';ctx.font=`${Math.min(13,W*.036)}px Arial`;ctx.fillText('← 戻る',W/2,H*.92);ctx.textAlign='left';
}

// ── GAME OVER ─────────────────────────────────────────────
function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,.75)';ctx.fillRect(0,0,W,H);
  const win=boss&&boss.dead&&score>0;
  const pw=Math.min(W*.82,340),ph=win?250:225,px=(W-pw)/2,py=(H-ph)/2;
  ctx.save();
  const fc=win?'#ffaa00':'#ff2222';
  ctx.shadowColor=fc;ctx.shadowBlur=32;ctx.beginPath();ctx.roundRect(px,py,pw,ph,16);ctx.fillStyle=win?'rgba(30,20,0,.96)':'rgba(30,5,5,.96)';ctx.fill();ctx.strokeStyle=fc;ctx.lineWidth=2;ctx.stroke();ctx.shadowBlur=0;
  ctx.textAlign='center';ctx.fillStyle=win?'#ffdd44':'#ff3333';ctx.font=`bold ${Math.min(38,pw*.13)}px Arial`;ctx.shadowColor=fc;ctx.shadowBlur=25;
  ctx.fillText(win?'🏆 VICTORY!':'GAME OVER',W/2,py+58);ctx.shadowBlur=0;
  ctx.fillStyle='#fff';ctx.font=`bold ${Math.min(20,pw*.07)}px Arial`;ctx.fillText(`SCORE: ${score}`,W/2,py+102);ctx.fillText(`WAVE: ${wave}`,W/2,py+130);
  if(win){ctx.fillStyle='#ffdd88';ctx.font=`${Math.min(15,pw*.055)}px Arial`;ctx.fillText(`ボスを倒した！`,W/2,py+162);}
  ctx.fillStyle='rgba(255,255,255,.6)';ctx.font=`${Math.min(13,pw*.048)}px Arial`;ctx.fillText('タップしてリスタート',W/2,py+(win?200:172));ctx.restore();ctx.textAlign='left';
}

// ── MAIN LOOP ─────────────────────────────────────────────
let lastT=0;
function loop(t){
  requestAnimationFrame(loop);const dt=Math.min((t-lastT)/1000,.05);lastT=t;now+=dt;
  updSelScroll(dt);
  if(shk.d>0){shk.d-=dt;shk.x=(Math.random()-.5)*shk.i*2;shk.y=(Math.random()-.5)*shk.i*2;shk.i*=.88;}else{shk.x=shk.y=0;}
  fl.a=Math.max(0,fl.a-dt*3);
  try{
  ctx.save();ctx.translate(shk.x,shk.y);
  if(state==='mode_select'){drawModeSelect();}
  else if(state==='select'){drawSelectScreen();}
  else if(state==='boss_select'){drawBossSelectScreen();}
  else if(state==='playing'){
    PL.update(dt);updSpawn(dt);
    if(boss){boss.update(dt);if(boss.dead&&state!=='gameover'){/* victory handled in boss.hit */}}
    for(let i=enemies.length-1;i>=0;i--){enemies[i].update(dt);if(enemies[i].dead)enemies.splice(i,1);}
    updAtk(dt);updPts(dt);
    // Boss bullet homing update
    for(const a of attacks){if(a.type==='bossBullet'&&a.homing&&a.homingTarget&&!a.dead){const tx2=a.homingTarget.x-a.x,ty2=a.homingTarget.y-a.y,td=Math.hypot(tx2,ty2)||1;a.dx=a.dx*.97+(tx2/td)*.03;a.dy=a.dy*.97+(ty2/td)*.03;const dlen=Math.hypot(a.dx,a.dy)||1;a.dx/=dlen;a.dy/=dlen;}}
    // Player attacks hit boss
    if(boss&&!boss.dead){
      for(const a of attacks){
        if(a.dead||a.type==='bossBullet'||a.type==='bossSlam'||a.type==='soundOrb'||a.type==='bruteSlam')continue;
        // Point attacks
        if(a.x!==undefined&&Math.hypot(a.x-boss.x,a.y-boss.y)<boss.r+(a.r||15)){
          if(!a._bossHit){a._bossHit=true;boss.hit(a.dmg||20);}
        }
      }
      if(roarBeam){const rx=boss.x-roarBeam.ox,ry=boss.y-roarBeam.oy,proj=rx*Math.cos(roarBeam.angle)+ry*Math.sin(roarBeam.angle),perp=Math.abs(-rx*Math.sin(roarBeam.angle)+ry*Math.cos(roarBeam.angle));if(proj>0&&perp<roarBeam.width/2+boss.r)boss.hit(95*dt);}
      if(hydroBeam){const rx=boss.x-hydroBeam.ox,ry=boss.y-hydroBeam.oy,proj=rx*Math.cos(hydroBeam.angle)+ry*Math.sin(hydroBeam.angle),perp=Math.abs(-rx*Math.sin(hydroBeam.angle)+ry*Math.cos(hydroBeam.angle));if(proj>0&&perp<hydroBeam.width/2+boss.r){boss.hit(42*dt);}}
    }
    drawWorld();ctx.save();ctx.translate(camX(),camY());drawAtk();for(const e of enemies)e.draw();if(boss&&!boss.dead)boss.draw();PL.draw();ctx.restore();
    drawPts();drawHUD();
  }else{drawWorld();ctx.save();ctx.translate(camX(),camY());for(const e of enemies)e.draw();if(boss&&!boss.dead)boss.draw();ctx.restore();drawGameOver();}
  if(fl.a>.01){ctx.fillStyle=fl.c;ctx.globalAlpha=fl.a;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  ctx.restore();
  }catch(err){ctx.restore();const d=document.getElementById('_err')||document.createElement('div');d.id='_err';d.style.cssText='position:fixed;top:50px;left:0;right:0;padding:8px;background:rgba(200,0,0,.9);color:#fff;font:11px monospace;z-index:9999';d.textContent='GameError('+state+'): '+(err.message||err)+' | '+(err.stack||'').split('\n')[1];document.body.appendChild(d);}
}
requestAnimationFrame(loop);
</script>
